        <style>
            button {
                background-color: #003366; /* Dark Blue */
                border: none;
                color: white;
                padding: 12px 24px;
                text-align: center;
                text-decoration: none;
                font-size: 16px;
                cursor: pointer;
                border-radius: 6px;
                transition: background-color 0.3s, transform 0.3s;
            }
    
            /* Hover Effects */
            button:hover {
                background-color: #002244; /* Darker Blue on Hover */
                transform: scale(1.05); /* Slight scaling */
            }
    
            /* Active Button State */
            button:active {
                background-color: #001122; /* Even Darker Blue */
                transform: scale(0.98); /* Slight compression on click */
            }
    
            /* Horizontal Button Container */
            .button-container {
                display: flex;
                justify-content: space-around;
                flex-wrap: wrap;
                gap: 10px; /* Space between buttons */
            }
        </style> 
    
</head>
