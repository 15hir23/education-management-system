<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index Page</title>
    <link rel="stylesheet" href="static/login.css">
    <link rel="stylesheet" href="./font-awesome-4.7.0/css/font-awesome.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
</head>
<style>
    body {
        font-size: 16px;
        font-family: 'Roboto', sans-serif;
        background-image: url('static/images/bg.jpg');
        background-size: cover; /* Cover the whole viewport */
        background-position: center; /* Center the image */
        color: rgb(255, 255, 255);
        margin: 0;
        height: 100vh; /* Ensure body takes full height */
    }
    body::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.26); /* Dark overlay with opacity */
    z-index: -1; /* Send it behind other content */
}

</style>
<body>
    <div class="title">
        <span>Education Management System</span>
    </div>
    <div class="button-container">
        <a href="/index2" class="button">Home</a>
    </div>
    <div class="main">
        <div class="login">
            <form action="/admin" method="post" name="login">
            
                <fieldset>
                    <legend class="heading">Admin Login</legend>
                    <input type="text" name="userid" placeholder="Email" autocomplete="off">
                    <input type="password" name="password" placeholder="Password" autocomplete="off">
                    <input type="submit" value="Login">
                </fieldset>
            </form>    
        </div>
        <div class="search">
            <form action="/student" method="get" onsubmit="return validateForm()">
                <fieldset>
                    <legend class="heading">For Students</legend>
                    <input type="text" name="course" id="course" placeholder="Course">
                    <input type="number" name="rn" id="rollNo" placeholder="Roll No">
                    <input type="submit" value="Login" id="loginButton">
                </fieldset>
            </form>
        </div>
        
        <script>
            function validateForm() {
                const course = document.getElementById('course').value;
                const rollNo = document.getElementById('rollNo').value;
        
                if (!course || !rollNo) {
                    alert('Please fill in both fields.');
                    return false; // Prevent form submission
                }
                return true; // Allow form submission
            }
        </script>
        
        
    </div>

</body>
</html>
