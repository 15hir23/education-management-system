<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Edumans Start Page</title>
    <style>
        body {
            font-size: 16px;
            font-family: 'Roboto', sans-serif;
            background-image: url('static/images/bg.jpg');
            background-size: cover;
            background-position: center;
            color: rgb(0, 0, 0);
            margin: 0;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.26);
            z-index: -1;
        }

        .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100vh;
            padding: 0 50px;
        }

        /* Left section for logo */
        .left-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo {
            width: 90%; /* Scalable size */
            max-width: 400px;
            animation: pulse 3s infinite;
            transition: all 0.5s ease-in-out;
        }

        .logo:hover {
            transform: scale(1.1);
        }

        /* Right section for text */
        .right-section {
            flex: 1;
            text-align: right;
            color: #ffffff;
            position: relative;
            animation: fadeIn 1.5s ease-out;
        }

        .main-text {
            font-size: 4rem;
            margin: 0;
            transform: translateX(100%);
            animation: slideInRight 1.5s forwards;
        }

        .subtext {
            font-size: 1.5rem;
            color: #ffffff;
            margin-top: 10px;
            opacity: 0;
            animation: fadeIn 3s forwards;
        }

        /* Keyframes for animations */
        @keyframes slideInRight {
            0% { transform: translateX(100%); }
            100% { transform: translateX(0); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 20px;
            right: 50px;
            color: rgb(255, 255, 255);
            text-align: center;
            cursor: pointer;
            animation: fadeInRight 2s infinite alternate;
        }

        .scroll-indicator .arrow {
            width: 30px;
            height: 30px;
            border-top: 3px solid rgb(255, 255, 255);
            border-right: 3px solid rgb(255, 255, 255);
            transform: rotate(45deg);
            margin-top: 5px;
            transition: all 0.3s ease;
        }

        @keyframes fadeInRight {
            0% { opacity: 0.6; transform: translateX(0); }
            100% { opacity: 1; transform: translateX(10px); }
        }

        .scroll-indicator:hover .arrow {
            transform: rotate(45deg) translateX(10px);
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            .main-text {
                font-size: 3rem;
            }

            .subtext {
                font-size: 1.2rem;
            }

            .logo {
                width: 50%; /* Adjust size for smaller screens */
            }

            .scroll-indicator {
                right: 30px;
            }
        }

        @media (max-width: 576px) {
            .main-text {
                font-size: 2.5rem;
                text-align: center;
            }

            .subtext {
                font-size: 1rem;
                text-align: center;
            }

            .logo {
                width: 60%; /* Smaller size for mobile */
            }

            .right-section {
                text-align: center;
            }

            .scroll-indicator {
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Section with logo -->
        <div class="left-section">
            <img src="{{ url_for('static', filename='images/logoeduman_bg.png') }}" alt="Edumans Logo" class="logo">
        </div>

        <!-- Right Section with animated text -->
        <div class="right-section">
            <h1 class="main-text">Education Management</h1>
            <p class="subtext">Empowering Education, Simplifying Management</p>
        </div>
    </div>

    <div class="scroll-indicator" onclick="window.location.href='/index2';">
        <span>Next</span>
        <div class="arrow"></div>
    </div>
</body>
</html>
